<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АДМИН ПАНЕЛЬ — F1 БРАСЛЕТЫ</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #E8002D;
            --red-dim: rgba(232,0,45,0.12);
            --red-glow: rgba(232,0,45,0.35);
            --bg: #080808;
            --surface: #111111;
            --surface2: #181818;
            --border: rgba(255,255,255,0.07);
            --border-mid: rgba(255,255,255,0.13);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.45);
            --text-dim: rgba(255,255,255,0.22);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── LOGIN ── */
        .login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: var(--bg);
        }

        .login-box {
            width: 100%;
            max-width: 360px;
            padding: 40px 32px;
            background: var(--surface);
            border: 1px solid var(--border-mid);
            border-radius: 12px;
            text-align: center;
        }

        .login-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .login-logo span { color: var(--red); }

        .login-sub {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .login-input {
            width: 100%;
            padding: 13px 14px;
            background: var(--bg);
            border: 1px solid var(--border-mid);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 12px;
        }

        .login-input:focus { border-color: var(--red); }
        .login-input::placeholder { color: var(--text-dim); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover { background: #ff0033; }

        .login-error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 10px;
            min-height: 16px;
        }

        /* ── ADMIN PANEL ── */
        .admin-panel {
            display: none;
            position: relative;
            z-index: 1;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-mid);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }

        .top-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
        }

        .top-logo span { color: var(--red); }

        .top-actions { display: flex; gap: 10px; align-items: center; }

        .top-btn {
            padding: 7px 16px;
            background: transparent;
            border: 1px solid var(--border-mid);
            border-radius: 6px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .top-btn:hover { color: var(--text); border-color: var(--red); }
        .top-btn.danger:hover { background: rgba(232,0,45,0.15); color: var(--red); }

        .refresh-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── STATS ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px 24px 0;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
        }

        .stat-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 1px;
            color: var(--red);
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        /* ── ORDERS ── */
        .orders-wrap {
            max-width: 1400px;
            margin: 20px auto 40px;
            padding: 0 24px;
        }

        .orders-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .orders-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
        }

        .filter-tab {
            padding: 5px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .filter-tab:hover { border-color: var(--border-mid); color: var(--text-muted); }
        .filter-tab.active { border-color: var(--red); color: var(--text); background: var(--red-dim); }

        /* ── ORDER CARD ── */
        .order-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .order-card:hover { border-color: var(--border-mid); }
        .order-card.open { border-color: var(--red); }

        .order-summary {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
        }

        .order-chevron {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            transition: transform 0.25s;
            flex-shrink: 0;
            font-size: 12px;
        }

        .order-card.open .order-chevron { transform: rotate(90deg); }

        .order-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
            color: var(--red);
            flex-shrink: 0;
            min-width: 60px;
        }

        .order-client {
            flex: 1;
            min-width: 0;
        }

        .order-client-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .order-client-city {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .order-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .order-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .order-date {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* STATUS BADGE */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
        }

        .s-новый       { background: rgba(232,0,45,0.15);   color: #ff6b8a; }
        .s-в_работе    { background: rgba(255,165,0,0.15);  color: #ffa94d; }
        .s-готов       { background: rgba(34,197,94,0.15);  color: #4ade80; }
        .s-отправлен   { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .s-отменён     { background: rgba(100,100,100,0.15);color: #9ca3af; }

        .dot-новый     { background: #ff6b8a; }
        .dot-в_работе  { background: #ffa94d; }
        .dot-готов     { background: #4ade80; }
        .dot-отправлен { background: #60a5fa; }
        .dot-отменён   { background: #9ca3af; }

        /* ORDER DETAILS */
        .order-details {
            display: none;
            border-top: 1px solid var(--border);
            padding: 20px;
        }

        .order-card.open .order-details { display: block; }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .detail-chip {
            background: var(--surface2);
            border-radius: 8px;
            padding: 10px 12px;
            border-left: 3px solid var(--red);
        }

        .detail-chip-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .detail-chip-val {
            font-size: 14px;
            font-weight: 500;
        }

        .composition-block {
            background: var(--surface2);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .composition-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .composition-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        .composition-item:last-child { border-bottom: none; }

        .composition-count {
            color: var(--red);
            font-weight: 600;
        }

        /* DELIVERY in details */
        .delivery-info {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ORDER ACTIONS */
        .order-actions-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-select {
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border-mid);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .status-select:focus { border-color: var(--red); }

        .btn-action {
            padding: 9px 16px;
            border-radius: 7px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            letter-spacing: 0.3px;
        }

        .btn-save {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        .btn-save:hover { background: #ff0033; }

        .btn-del {
            background: transparent;
            border-color: var(--border-mid);
            color: var(--text-dim);
        }

        .btn-del:hover { border-color: #ff6b6b; color: #ff6b6b; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
            font-size: 14px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(232,0,45,0.5); }

        /* ── SHOP TOGGLE ── */
        .shop-toggle-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 17px;
            letter-spacing: 2px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .shop-toggle-btn.is-open {
            background: rgba(34,197,94,0.18);
            border-color: rgba(34,197,94,0.5);
            color: #4ade80;
        }

        .shop-toggle-btn.is-open:hover {
            background: rgba(34,197,94,0.3);
            border-color: #4ade80;
        }

        .shop-toggle-btn.is-closed {
            background: rgba(232,0,45,0.2);
            border-color: rgba(232,0,45,0.6);
            color: #ff6b8a;
        }

        .shop-toggle-btn.is-closed:hover {
            background: rgba(232,0,45,0.35);
            border-color: var(--red);
        }

        .shop-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .is-open .shop-dot  { background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: blink 2s infinite; }
        .is-closed .shop-dot { background: #ff6b8a; }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .comment-block {
            background: rgba(232,0,45,0.06);
            border: 1px solid rgba(232,0,45,0.2);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }

        .comment-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--red);
            margin-bottom: 6px;
            opacity: 0.8;
        }

        .comment-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="login-logo">NOMINATION <span>F1</span></div>
        <div class="login-sub">Admin Panel</div>
        <input class="login-input" type="password" id="passwordInput" placeholder="Пароль">
        <button class="login-btn" onclick="handleLogin()">ВОЙТИ</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-panel">

    <div class="top-bar">
        <div class="top-logo">NOMINATION <span>F1</span> <span style="color:var(--text-dim);font-size:13px;letter-spacing:1px"> / ADMIN</span></div>
        <div class="top-actions">
            <div class="refresh-dot" title="Автообновление каждые 10с"></div>
            <button class="top-btn" onclick="loadOrders()">↻ Обновить</button>
            <button class="shop-toggle-btn is-open" id="shopToggleBtn" onclick="toggleShop()">
                <span class="shop-dot"></span>
                <span id="shopBtnLabel">ПРОДАЖИ ОТКРЫТЫ</span>
            </button>
            <button class="top-btn danger" onclick="handleLogout()">Выйти</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-val" id="statTotal">0</div>
            <div class="stat-label">Всего заказов</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statRevenue">0₽</div>
            <div class="stat-label">Общий доход</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statNew">0</div>
            <div class="stat-label">Новых</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statLinks">0</div>
            <div class="stat-label">Звеньев продано</div>
        </div>
    </div>

    <div class="orders-wrap">
        <div class="orders-toolbar">
            <div class="orders-title">Заказы</div>
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="setFilter('all', this)">Все</button>
                <button class="filter-tab" onclick="setFilter('новый', this)">Новые</button>
                <button class="filter-tab" onclick="setFilter('в работе', this)">В работе</button>
                <button class="filter-tab" onclick="setFilter('отправлен', this)">Отправлен</button>
            </div>
        </div>
        <div id="ordersList"></div>
    </div>

</div>

<script>
    let isLoggedIn = false;
    let allOrders = [];
    let currentFilter = 'all';
    let openOrderId = null;


    // ── УПРАВЛЕНИЕ МАГАЗИНОМ ──
    let shopIsOpen = true;

    function loadShopStatus() {
        fetch('/api/shop/status')
            .then(r => r.json())
            .then(data => applyShopStatus(data.is_open))
            .catch(() => {});
    }

    function toggleShop() {
        fetch('/api/admin/shop/toggle', { method: 'POST' })
            .then(r => r.json())
            .then(data => applyShopStatus(data.is_open))
            .catch(err => console.error('Ошибка:', err));
    }

    function applyShopStatus(isOpen) {
        shopIsOpen = isOpen;
        const btn = document.getElementById('shopToggleBtn');
        const label = document.getElementById('shopBtnLabel');
        btn.className = isOpen ? 'shop-toggle-btn is-open' : 'shop-toggle-btn is-closed';
        label.textContent = isOpen ? 'ПРОДАЖИ ОТКРЫТЫ' : 'ПРОДАЖИ ЗАКРЫТЫ';
    }

    // ── AUTH ──
    function handleLogin() {
        const password = document.getElementById('passwordInput').value;
        if (!password) { showLoginError('Введите пароль'); return; }

        fetch('/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password})
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                isLoggedIn = true;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadOrders();
                loadShopStatus();
                setInterval(loadOrders, 10000);
            } else {
                showLoginError('Неверный пароль');
            }
        })
        .catch(() => showLoginError('Ошибка подключения'));
    }

    function showLoginError(msg) {
        document.getElementById('loginError').textContent = msg;
    }

    function handleLogout() {
        isLoggedIn = false;
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        document.getElementById('loginError').textContent = '';
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('passwordInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') handleLogin();
        });
    });

    // ── DATA ──
    function loadOrders() {
        if (!isLoggedIn) return;
        fetch('/api/admin/orders')
            .then(r => r.json())
            .then(orders => {
                allOrders = orders;
                renderOrders();
                updateStats(orders);
            })
            .catch(err => console.error('Ошибка загрузки:', err));
    }

    function setFilter(filter, el) {
        currentFilter = filter;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderOrders();
    }

    // ── RENDER ──
    function renderOrders() {
        const list = document.getElementById('ordersList');
        const filtered = currentFilter === 'all'
            ? allOrders
            : allOrders.filter(o => o.status === currentFilter);

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state">Заказов нет</div>';
            return;
        }

        list.innerHTML = filtered.map(order => buildOrderCard(order)).join('');
    }

    function buildOrderCard(order) {
        const statusKey = order.status.replace(' ', '_');
        const date = new Date(order.createdAt).toLocaleString('ru-RU', {
            day: '2-digit', month: '2-digit', year: '2-digit',
            hour: '2-digit', minute: '2-digit'
        });

        const braceletsCount = order.braceletsCount || 1;
        const braceletsData  = order.bracelets || null;

        // Состав — один или несколько браслетов
        let compositionHtml = '';
        if (braceletsData && braceletsData.length > 1) {
            compositionHtml = braceletsData.map(b => {
                const comp = Object.entries(b.composition || {})
                    .map(([team, count]) => `<div class="composition-item"><span>${team}</span><span class="composition-count">${count} зв.</span></div>`).join('');
                const dd = Object.entries(b.designDetails || {})
                    .map(([key, count]) => `<div class="composition-item" style="font-size:12px;color:var(--text-muted)"><span>🎨 ${key}</span><span class="composition-count">×${count}</span></div>`).join('');
                const refIcon = b.referencePhotoPath ? ' 📎' : '';
                return `<div style="margin-bottom:12px">
                    <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px">
                        Браслет ${b.braceletIndex}${refIcon} · ${b.wristSize} см · ${b.linksCount} зв. · ${b.price}₽
                    </div>
                    ${comp}
                    ${dd ? `<div style="margin-top:4px;padding-top:4px;border-top:1px solid var(--border)">${dd}</div>` : ''}
                </div>`;
            }).join('');
        } else {
            const composition = Object.entries(order.composition || {})
                .map(([team, count]) => `<div class="composition-item"><span>${team}</span><span class="composition-count">${count} зв.</span></div>`).join('');
            const designDetails = Object.entries(order.designDetails || {})
                .map(([key, count]) => `<div class="composition-item" style="font-size:12px;color:var(--text-muted)"><span>🎨 ${key}</span><span class="composition-count">×${count}</span></div>`).join('');
            compositionHtml = (composition || '<span style="color:var(--text-dim)">—</span>') +
                (designDetails ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">${designDetails}</div>` : '');
        }

        const deliveryBlock = order.deliveryPrice
            ? `<div class="delivery-info">
                🚚 <strong>СДЭК</strong> &nbsp;—&nbsp; ${order.deliveryPrice}₽
                ${order.deliveryTariff ? `<span style="color:var(--text-dim);font-size:11px">(тариф ${order.deliveryTariff})</span>` : ''}
               </div>`
            : '';

        const countBadge = braceletsCount > 1
            ? `<span style="font-size:11px;background:var(--red-dim);color:var(--red);border:1px solid rgba(232,0,45,0.25);border-radius:3px;padding:1px 6px;margin-left:6px;font-family:'Inter',sans-serif">${braceletsCount} бр.</span>`
            : '';

        const isOpen = openOrderId === order.id;

        return `
        <div class="order-card ${isOpen ? 'open' : ''}" id="card-${order.id}">
            <div class="order-summary" onclick="toggleOrder(${order.id})">
                <div class="order-chevron">▶</div>
                <div class="order-num">#${order.id}${countBadge}</div>
                <div class="order-client">
                    <div class="order-client-name">${order.userName || '—'}</div>
                    <div class="order-client-city">${order.userCity || ''} ${order.userTg || ''}</div>
                </div>
                <div class="order-meta">
                    <div class="order-date">${date}</div>
                    <div class="order-price">${order.totalPrice}₽</div>
                    <div class="status-badge s-${statusKey}">
                        <span class="status-dot dot-${statusKey}"></span>
                        ${order.status}
                    </div>
                </div>
            </div>

            <div class="order-details">
                <div class="details-grid">
                    <div class="detail-chip">
                        <div class="detail-chip-label">📱 Телефон</div>
                        <div class="detail-chip-val">${order.userPhone || '—'}</div>
                    </div>
                    <div class="detail-chip">
                        <div class="detail-chip-label">🔷 Telegram</div>
                        <div class="detail-chip-val">${order.userTg || '—'}</div>
                    </div>
                    <div class="detail-chip">
                        <div class="detail-chip-label">🏙️ Город</div>
                        <div class="detail-chip-val">${order.userCity || '—'}</div>
                    </div>
                    <div class="detail-chip">
                        <div class="detail-chip-label">🛍️ Браслетов</div>
                        <div class="detail-chip-val">${braceletsCount}</div>
                    </div>
                    <div class="detail-chip">
                        <div class="detail-chip-label">🔗 Звеньев</div>
                        <div class="detail-chip-val">${order.linksCount}</div>
                    </div>
                    <div class="detail-chip">
                        <div class="detail-chip-label">💰 Браслет(ы)</div>
                        <div class="detail-chip-val">${order.totalPrice - (order.deliveryPrice || 0)}₽</div>
                    </div>
                </div>

                ${deliveryBlock}

                ${order.userComment ? `
                <div class="comment-block">
                    <div class="comment-label">💬 Комментарий клиента</div>
                    <div class="comment-text">\${order.userComment}</div>
                </div>` : ''}

                <div class="composition-block">
                    <div class="composition-label">Состав ${braceletsCount > 1 ? 'браслетов' : 'браслета'}</div>
                    ${compositionHtml}
                </div>

                <div class="order-actions-bar">
                    <select class="status-select" id="sel-${order.id}">
                        <option value="новый"      ${order.status === 'новый'      ? 'selected' : ''}>Новый</option>
                        <option value="в работе"   ${order.status === 'в работе'   ? 'selected' : ''}>В работе</option>
                        <option value="готов"       ${order.status === 'готов'       ? 'selected' : ''}>Готов</option>
                        <option value="отправлен"  ${order.status === 'отправлен'  ? 'selected' : ''}>Отправлен</option>
                        <option value="отменён"    ${order.status === 'отменён'    ? 'selected' : ''}>Отменён</option>
                    </select>
                    <button class="btn-action btn-save" onclick="saveStatus(${order.id})">Сохранить</button>
                    <button class="btn-action btn-del" onclick="handleDelete(${order.id})">🗑 Удалить</button>
                </div>
            </div>
        </div>`;
    }

    // ── TOGGLE ──
    function toggleOrder(id) {
        const card = document.getElementById(`card-${id}`);
        if (openOrderId === id) {
            // закрыть
            card.classList.remove('open');
            openOrderId = null;
        } else {
            // закрыть предыдущий
            if (openOrderId !== null) {
                const prev = document.getElementById(`card-${openOrderId}`);
                if (prev) prev.classList.remove('open');
            }
            card.classList.add('open');
            openOrderId = id;
        }
    }

    // ── ACTIONS ──
    function saveStatus(orderId) {
        const newStatus = document.getElementById(`sel-${orderId}`).value;
        fetch(`/api/admin/order/${orderId}/status`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: newStatus})
        })
        .then(r => r.json())
        .then(() => loadOrders())
        .catch(err => console.error('Ошибка:', err));
    }

    function handleDelete(orderId) {
        if (!confirm(`Удалить заказ #${orderId}?`)) return;
        fetch(`/api/admin/order/${orderId}`, {method: 'DELETE'})
            .then(r => r.json())
            .then(() => {
                if (openOrderId === orderId) openOrderId = null;
                loadOrders();
            })
            .catch(err => console.error('Ошибка:', err));
    }

    // ── STATS ──
    function updateStats(orders) {
        document.getElementById('statTotal').textContent = orders.length;
        const revenue = orders.reduce((s, o) => s + (o.totalPrice || 0), 0);
        document.getElementById('statRevenue').textContent = revenue.toLocaleString('ru-RU') + '₽';
        document.getElementById('statNew').textContent = orders.filter(o => o.status === 'новый').length;
        document.getElementById('statLinks').textContent = orders.reduce((s, o) => s + (o.linksCount || 0), 0);
    }
</script>
</body>
</html>
