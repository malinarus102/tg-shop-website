<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АДМИН ПАНЕЛЬ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .login-box {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #CC0000;
            padding: 50px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 2em;
            color: #CC0000;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 1em;
        }

        .login-box input:focus {
            outline: none;
            border-color: #CC0000;
            background: rgba(204, 0, 0, 0.1);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #CC0000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-box button:hover {
            background: #ff0000;
        }

        .error {
            color: #CC0000;
            margin-top: 15px;
            font-weight: bold;
        }

        .admin-panel {
            display: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(20,20,20,0.8));
            border-bottom: 3px solid #CC0000;
            margin-bottom: 30px;
            border-radius: 6px;
        }

        .admin-header h1 {
            font-size: 2em;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logout-btn {
            background: #333;
            border: 1px solid #CC0000;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 700;
            border-radius: 4px;
        }

        .logout-btn:hover {
            background: #CC0000;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #333;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2.5em;
            color: #CC0000;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #aaa;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .orders-section {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #333;
            border-radius: 6px;
            overflow: hidden;
        }

        .orders-header {
            background: linear-gradient(90deg, rgba(204, 0, 0, 0.2) 0%, rgba(0,0,0,0.5) 100%);
            padding: 20px 30px;
            border-bottom: 2px solid #CC0000;
        }

        .orders-header h2 {
            font-size: 1.5em;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .orders-list {
            max-height: 70vh;
            overflow-y: auto;
        }

        .order-item {
            padding: 25px 30px;
            border-bottom: 1px solid #333;
        }

        .order-item:hover {
            background: rgba(204, 0, 0, 0.1);
            border-left: 4px solid #CC0000;
            padding-left: 26px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-id {
            font-size: 1.2em;
            color: #CC0000;
            font-weight: 900;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-новый {
            background: rgba(204, 0, 0, 0.3);
            color: #ff6666;
        }

        .status-в_обработке {
            background: rgba(255, 165, 0, 0.3);
            color: #FFB84D;
        }

        .status-готов {
            background: rgba(34, 139, 34, 0.3);
            color: #66BB6A;
        }

        .status-отправлен {
            background: rgba(30, 144, 255, 0.3);
            color: #64B5F6;
        }

        .order-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .order-info-item {
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            border-left: 3px solid #CC0000;
        }

        .order-info-item .label {
            color: #888;
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .order-info-item .value {
            color: #fff;
            font-weight: 700;
        }

        .order-composition {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .order-composition strong {
            color: #CC0000;
        }

        .btn {
            padding: 8px 16px;
            background: #CC0000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
        }

        .btn:hover {
            background: #ff0000;
        }

        .btn-delete {
            background: #333;
            border: 1px solid #666;
        }

        .btn-delete:hover {
            background: #555;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-select {
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 0.9em;
            cursor: pointer;
        }

        .status-select:hover {
            border-color: #CC0000;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #CC0000;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff0000;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 Админ Панель</h1>
            <input type="password" id="passwordInput" placeholder="Введите пароль">
            <button onclick="handleLogin()">ВХОД</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="container">
            <div class="admin-header">
                <div>
                    <h1>🏁 F1 БРАСЛЕТЫ - АДМИН</h1>
                </div>
                <button class="logout-btn" onclick="handleLogout()">ВЫХОД</button>
            </div>

            <div class="admin-stats">
                <div class="stat-card">
                    <div class="number" id="totalOrders">0</div>
                    <div class="label">Всего заказов</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalRevenue">0₽</div>
                    <div class="label">Общий доход</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="newOrders">0</div>
                    <div class="label">Новых</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalLinks">0</div>
                    <div class="label">Звеньев продано</div>
                </div>
            </div>

            <div class="orders-section">
                <div class="orders-header">
                    <h2>📦 ВСЕ ЗАКАЗЫ</h2>
                </div>
                <div class="orders-list" id="ordersList"></div>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;

        function handleLogin() {
            const password = document.getElementById('passwordInput').value;
            if (!password) {
                document.getElementById('loginError').textContent = '❌ Введите пароль';
                return;
            }

            fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: password})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    isLoggedIn = true;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadOrders();
                    setInterval(loadOrders, 5000);
                } else {
                    document.getElementById('loginError').textContent = '❌ Неверный пароль';
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('loginError').textContent = '❌ Ошибка подключения';
            });
        }

        function handleLogout() {
            isLoggedIn = false;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').textContent = '';
        }

        function loadOrders() {
            if (!isLoggedIn) return;

            fetch('/api/admin/orders')
                .then(response => response.json())
                .then(orders => {
                    renderOrders(orders);
                    updateStats(orders);
                })
                .catch(error => console.error('Ошибка загрузки:', error));
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');

            if (orders.length === 0) {
                list.innerHTML = '<div style="padding: 40px; text-align: center; color: #666;">Заказы отсутствуют</div>';
                return;
            }

            list.innerHTML = orders.map(order => {
                const dateStr = new Date(order.createdAt).toLocaleString('ru-RU');
                const composition = Object.entries(order.composition)
                    .map(([team, count]) => `${team}: ${count} звеньев`)
                    .join('<br>');

                return `
                    <div class="order-item">
                        <div class="order-header">
                            <div class="order-id">Заказ #${order.id}</div>
                            <span class="status-badge status-${order.status.replace(' ', '_')}">${order.status}</span>
                        </div>

                        <div class="order-info">
                            <div class="order-info-item">
                                <div class="label">👤 Клиент</div>
                                <div class="value">${order.userName}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">📱 Телефон</div>
                                <div class="value">${order.userPhone}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">🔷 Telegram</div>
                                <div class="value">${order.userTg}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">🏙️ Город</div>
                                <div class="value">${order.userCity || 'Не указан'}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">📏 Размер запястья</div>
                                <div class="value">${order.wristSize} см</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">🔗 Звеньев</div>
                                <div class="value">${order.linksCount}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">💰 Сумма</div>
                                <div class="value">${order.totalPrice}₽</div>
                            </div>
                        </div>

                        <div class="order-composition">
                            <strong>Состав браслета:</strong><br>
                            ${composition}
                        </div>

                        <div style="font-size: 0.85em; color: #888; margin-bottom: 15px;">
                            ⏰ ${dateStr}
                        </div>

                        <div class="order-actions">
                            <select class="status-select" onchange="handleStatusChange(${order.id}, this.value)">
                                <option value="новый" ${order.status === 'новый' ? 'selected' : ''}>Новый</option>
                                <option value="в обработке" ${order.status === 'в обработке' ? 'selected' : ''}>В обработке</option>
                                <option value="готов" ${order.status === 'готов' ? 'selected' : ''}>Готов</option>
                                <option value="отправлен" ${order.status === 'отправлен' ? 'selected' : ''}>Отправлен</option>
                            </select>
                            <button class="btn btn-delete" onclick="handleDelete(${order.id})">🗑️ УДАЛИТЬ</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            
            const totalRevenue = orders.reduce((sum, o) => sum + o.totalPrice, 0);
            document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString('ru-RU') + '₽';
            
            const newCount = orders.filter(o => o.status === 'новый').length;
            document.getElementById('newOrders').textContent = newCount;
            
            const totalLinks = orders.reduce((sum, o) => sum + o.linksCount, 0);
            document.getElementById('totalLinks').textContent = totalLinks;
        }

        function handleStatusChange(orderId, newStatus) {
            fetch(`/api/admin/order/${orderId}/status`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: newStatus})
            })
            .then(response => response.json())
            .then(data => {
                console.log('✅ Статус обновлен');
                loadOrders();
            })
            .catch(error => console.error('Ошибка:', error));
        }

        function handleDelete(orderId) {
            if (confirm('Вы уверены? Заказ будет удален.')) {
                fetch(`/api/admin/order/${orderId}`, {method: 'DELETE'})
                    .then(response => response.json())
                    .then(data => {
                        console.log('✅ Заказ удален');
                        loadOrders();
                    })
                    .catch(error => console.error('Ошибка:', error));
            }
        }

        function submitOrder() {
            const totalPrice2 = calculateTotalPrice();

            const userName = prompt('Введите ваше имя:');
            if (!userName) return;

            const userPhone = prompt('Введите номер телефона:');
            if (!userPhone) return;

            const userTg = prompt('Введите ваш Telegram (например, @username):');
            if (!userTg) return;

            const orderData = {
                wristSize: wristSize,
                linksCount: selectedLinks.length,
                totalPrice: totalPrice2,
                links: selectedLinks,
                userName: userName,
                userPhone: userPhone,
                userTg: userTg
            };

            fetch('/api/order', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(orderData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showThankYouScreen(userName, totalPrice2);
                } else {
                    alert('❌ Ошибка: ' + data.message);
                }
            })
            .catch(err => {
                console.error('Ошибка:', err);
                alert('❌ Ошибка отправки заказа');
            });
        }

        function calculateTotalPrice() {
            let totalPrice = 700;
            if (selectedLinks.length > 20) {
                const extraLinks = selectedLinks.length - 20;
                totalPrice += extraLinks * 40;
            }
            return totalPrice;
        }

        function showThankYouScreen(userName, totalPrice) {
            // Создаем экран спасибки
            const thankYouHTML = `
                <div style="
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999;
                ">
                    <div style="
                        background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
                        border: 3px solid #CC0000;
                        padding: 60px 50px;
                        border-radius: 8px;
                        text-align: center;
                        max-width: 500px;
                        animation: slideIn 0.5s ease-out;
                    ">
                        <div style="font-size: 4em; margin-bottom: 20px;">✅</div>
                        <h1 style="
                            font-size: 2em;
                            color: #fff;
                            margin-bottom: 20px;
                            text-transform: uppercase;
                            letter-spacing: 2px;
                        ">СПАСИБО ЗА ЗАКАЗ!</h1>
                        
                        <p style="
                            font-size: 1.1em;
                            color: #aaa;
                            margin-bottom: 15px;
                            line-height: 1.6;
                        ">
                            Привет, <strong style="color: #CC0000;">${userName}</strong>!<br><br>
                            Ваш заказ успешно принят 🎉<br>
                            <strong style="color: #fff; font-size: 1.2em;">Сумма: ${totalPrice}₽</strong>
                        </p>

                        <div style="
                            background: rgba(204, 0, 0, 0.1);
                            border-left: 4px solid #CC0000;
                            padding: 20px;
                            margin-bottom: 30px;
                            border-radius: 4px;
                            text-align: left;
                        ">
                            <p style="color: #fff; margin-bottom: 10px;">
                                📞 <strong>Мы скоро свяжемся с вами</strong>
                            </p>
                            <p style="color: #aaa; font-size: 0.95em;">
                                Администратор уже получил ваш заказ и свяжется через Telegram в ближайшее время 🚀
                            </p>
                        </div>

                        <div style="margin-bottom: 30px;">
                            <p style="color: #888; font-size: 0.9em;">
                                Номер вашего заказа будет отправлен в личные сообщения
                            </p>
                        </div>

                        <button onclick="location.reload()" style="
                            width: 100%;
                            padding: 16px;
                            background: #CC0000;
                            color: #fff;
                            border: none;
                            border-radius: 4px;
                            font-weight: 700;
                            font-size: 1.1em;
                            cursor: pointer;
                            text-transform: uppercase;
                            letter-spacing: 1px;
                            transition: all 0.3s;
                        " onmouseover="this.style.background='#ff0000'" onmouseout="this.style.background='#CC0000'">
                            НОВЫЙ ЗАКАЗ
                        </button>
                    </div>
                </div>

                <style>
                    @keyframes slideIn {
                        from {
                            opacity: 0;
                            transform: translateY(-50px);
                        }
                        to {
                            opacity: 1;
                            transform: translateY(0);
                        }
                    }
                </style>
            `;

            // Вставляем на страницу
            document.body.insertAdjacentHTML('beforeend', thankYouHTML);

            // Через 5 секунд автоматически перезагрузим
            setTimeout(() => {
                location.reload();
            }, 8000);
        }

        // Enter в поле пароля
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
        });
    </script>
</body>
</html>
