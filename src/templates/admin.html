<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АДМИН ПАНЕЛЬ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .login-box {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #CC0000;
            padding: 50px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 2em;
            color: #CC0000;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 1em;
        }

        .login-box input:focus {
            outline: none;
            border-color: #CC0000;
            background: rgba(204, 0, 0, 0.1);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #CC0000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-box button:hover { background: #ff0000; }

        .error {
            color: #CC0000;
            margin-top: 15px;
            font-weight: bold;
        }

        .admin-panel { display: none; }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(20,20,20,0.8));
            border-bottom: 3px solid #CC0000;
            margin-bottom: 30px;
            border-radius: 6px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .admin-header h1 {
            font-size: 2em;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .logout-btn {
            background: #333;
            border: 1px solid #CC0000;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 700;
            border-radius: 4px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logout-btn:hover { background: #CC0000; }

        /* ── КНОПКА МАГАЗИНА ── */
        .shop-toggle-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.95em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.25s;
            min-width: 220px;
            text-align: center;
        }

        .shop-toggle-btn.open {
            background: rgba(34,139,34,0.25);
            border: 2px solid #66BB6A;
            color: #66BB6A;
        }

        .shop-toggle-btn.open:hover {
            background: rgba(34,139,34,0.45);
        }

        .shop-toggle-btn.closed {
            background: rgba(204,0,0,0.25);
            border: 2px solid #CC0000;
            color: #ff6666;
        }

        .shop-toggle-btn.closed:hover {
            background: rgba(204,0,0,0.45);
        }

        /* ── BANNER ── */
        .shop-status-banner {
            display: none;
            padding: 14px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 0.95em;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .shop-status-banner.open {
            background: rgba(34,139,34,0.15);
            border: 1px solid #66BB6A;
            color: #66BB6A;
        }

        .shop-status-banner.closed {
            background: rgba(204,0,0,0.15);
            border: 1px solid #CC0000;
            color: #ff6666;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #333;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2.5em;
            color: #CC0000;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #aaa;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .orders-section {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #333;
            border-radius: 6px;
            overflow: hidden;
        }

        .orders-header {
            background: linear-gradient(90deg, rgba(204, 0, 0, 0.2) 0%, rgba(0,0,0,0.5) 100%);
            padding: 20px 30px;
            border-bottom: 2px solid #CC0000;
        }

        .orders-header h2 {
            font-size: 1.5em;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .orders-list {
            max-height: 70vh;
            overflow-y: auto;
        }

        .order-item {
            padding: 25px 30px;
            border-bottom: 1px solid #333;
        }

        .order-item:hover {
            background: rgba(204, 0, 0, 0.1);
            border-left: 4px solid #CC0000;
            padding-left: 26px;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-id {
            font-size: 1.2em;
            color: #CC0000;
            font-weight: 900;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-новый { background: rgba(204,0,0,0.3); color: #ff6666; }
        .status-в_обработке { background: rgba(255,165,0,0.3); color: #FFB84D; }
        .status-готов { background: rgba(34,139,34,0.3); color: #66BB6A; }
        .status-отправлен { background: rgba(30,144,255,0.3); color: #64B5F6; }
        .status-отменён { background: rgba(100,100,100,0.3); color: #aaa; }

        .order-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .order-info-item {
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            border-left: 3px solid #CC0000;
        }

        .order-info-item .label {
            color: #888;
            font-size: 0.8em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .order-info-item .value { color: #fff; font-weight: 700; }

        .order-composition {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .order-composition strong { color: #CC0000; }

        .btn {
            padding: 8px 16px;
            background: #CC0000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9em;
        }

        .btn:hover { background: #ff0000; }

        .btn-delete {
            background: #333;
            border: 1px solid #666;
        }

        .btn-delete:hover { background: #555; }

        .order-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-select {
            padding: 8px 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 0.9em;
            cursor: pointer;
        }

        .status-select:hover { border-color: #CC0000; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: #CC0000; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff0000; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 Админ Панель</h1>
            <input type="password" id="passwordInput" placeholder="Введите пароль">
            <button onclick="handleLogin()">ВХОД</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="container">
            <div class="admin-header">
                <div>
                    <h1>🏁 F1 БРАСЛЕТЫ - АДМИН</h1>
                </div>
                <div class="header-controls">
                    <button id="shopToggleBtn" class="shop-toggle-btn" onclick="toggleShop()">⏳ Загрузка...</button>
                    <button class="logout-btn" onclick="handleLogout()">ВЫХОД</button>
                </div>
            </div>

            <div id="shopStatusBanner" class="shop-status-banner"></div>

            <div class="admin-stats">
                <div class="stat-card">
                    <div class="number" id="totalOrders">0</div>
                    <div class="label">Всего заказов</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalRevenue">0₽</div>
                    <div class="label">Общий доход</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="newOrders">0</div>
                    <div class="label">Новых</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalLinks">0</div>
                    <div class="label">Звеньев продано</div>
                </div>
            </div>

            <div class="orders-section">
                <div class="orders-header">
                    <h2>📦 ВСЕ ЗАКАЗЫ</h2>
                </div>
                <div class="orders-list" id="ordersList"></div>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let shopPassword = '';

        function handleLogin() {
            const password = document.getElementById('passwordInput').value;
            if (!password) {
                document.getElementById('loginError').textContent = '❌ Введите пароль';
                return;
            }

            fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    isLoggedIn = true;
                    shopPassword = password;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadOrders();
                    loadShopStatus();
                    setInterval(loadOrders, 5000);
                } else {
                    document.getElementById('loginError').textContent = '❌ Неверный пароль';
                }
            })
            .catch(() => {
                document.getElementById('loginError').textContent = '❌ Ошибка подключения';
            });
        }

        function handleLogout() {
            isLoggedIn = false;
            shopPassword = '';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').textContent = '';
        }

        // ── УПРАВЛЕНИЕ МАГАЗИНОМ ──
        function loadShopStatus() {
            fetch('/api/shop/status')
                .then(r => r.json())
                .then(data => updateShopUI(data.open))
                .catch(() => {});
        }

        function updateShopUI(isOpen) {
            const btn = document.getElementById('shopToggleBtn');
            const banner = document.getElementById('shopStatusBanner');

            if (isOpen) {
                btn.textContent = '🟢 ПРОДАЖИ ОТКРЫТЫ';
                btn.className = 'shop-toggle-btn open';
                banner.textContent = '✅ Магазин открыт — покупатели могут оформлять заказы';
                banner.className = 'shop-status-banner open';
            } else {
                btn.textContent = '🔴 ПРОДАЖИ ЗАКРЫТЫ';
                btn.className = 'shop-toggle-btn closed';
                banner.textContent = '🚫 Магазин закрыт — покупатели видят заглушку';
                banner.className = 'shop-status-banner closed';
            }
            banner.style.display = 'block';
        }

        function toggleShop() {
            const btn = document.getElementById('shopToggleBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Применяем...';

            fetch('/api/admin/shop/toggle', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: shopPassword})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    updateShopUI(data.open);
                    const msg = data.open ? '✅ Продажи открыты!' : '🔴 Продажи закрыты!';
                    showToast(msg);
                } else {
                    showToast('❌ Ошибка: ' + data.message);
                }
            })
            .catch(() => showToast('❌ Ошибка соединения'))
            .finally(() => { btn.disabled = false; });
        }

        // ── ТОСТ-УВЕДОМЛЕНИЕ ──
        function showToast(message) {
            const existing = document.getElementById('toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'toast';
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                background: #1a1a1a; border: 1px solid #CC0000; color: #fff;
                padding: 12px 24px; border-radius: 6px; font-weight: 700;
                font-size: 0.95em; z-index: 9999; animation: fadeIn 0.3s ease;
                box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ── ЗАКАЗЫ ──
        function loadOrders() {
            if (!isLoggedIn) return;
            fetch('/api/admin/orders')
                .then(r => r.json())
                .then(orders => {
                    renderOrders(orders);
                    updateStats(orders);
                })
                .catch(err => console.error('Ошибка загрузки:', err));
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');

            if (orders.length === 0) {
                list.innerHTML = '<div style="padding:40px;text-align:center;color:#666">Заказы отсутствуют</div>';
                return;
            }

            list.innerHTML = orders.map(order => {
                const dateStr = new Date(order.createdAt).toLocaleString('ru-RU');
                const composition = Object.entries(order.composition || {})
                    .map(([team, count]) => `${team}: ${count} звеньев`)
                    .join('<br>');

                const deliveryRow = order.deliveryPrice
                    ? `<div class="order-info-item"><div class="label">🚚 Доставка</div><div class="value">${order.deliveryPrice}₽</div></div>`
                    : '';

                return `
                    <div class="order-item">
                        <div class="order-header">
                            <div class="order-id">Заказ #${order.id}</div>
                            <span class="status-badge status-${order.status.replace(' ', '_')}">${order.status}</span>
                        </div>

                        <div class="order-info">
                            <div class="order-info-item">
                                <div class="label">👤 Клиент</div>
                                <div class="value">${order.userName}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">📱 Телефон</div>
                                <div class="value">${order.userPhone}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">🔷 Telegram</div>
                                <div class="value">${order.userTg}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">🏙️ Город</div>
                                <div class="value">${order.userCity || 'Не указан'}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">📏 Запястье</div>
                                <div class="value">${order.wristSize} см</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">🔗 Звеньев</div>
                                <div class="value">${order.linksCount}</div>
                            </div>
                            <div class="order-info-item">
                                <div class="label">💰 Сумма</div>
                                <div class="value">${order.totalPrice}₽</div>
                            </div>
                            ${deliveryRow}
                        </div>

                        <div class="order-composition">
                            <strong>Состав браслета:</strong><br>
                            ${composition}
                        </div>

                        <div style="font-size:0.85em;color:#888;margin-bottom:15px">
                            ⏰ ${dateStr}
                        </div>

                        <div class="order-actions">
                            <select class="status-select" onchange="handleStatusChange(${order.id}, this.value)">
                                <option value="новый" ${order.status === 'новый' ? 'selected' : ''}>Новый</option>
                                <option value="в работе" ${order.status === 'в работе' ? 'selected' : ''}>В работе</option>
                                <option value="готов" ${order.status === 'готов' ? 'selected' : ''}>Готов</option>
                                <option value="отправлен" ${order.status === 'отправлен' ? 'selected' : ''}>Отправлен</option>
                                <option value="отменён" ${order.status === 'отменён' ? 'selected' : ''}>Отменён</option>
                            </select>
                            <button class="btn btn-delete" onclick="handleDelete(${order.id})">🗑️ УДАЛИТЬ</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
            document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString('ru-RU') + '₽';
            const newCount = orders.filter(o => o.status === 'новый').length;
            document.getElementById('newOrders').textContent = newCount;
            const totalLinks = orders.reduce((sum, o) => sum + (o.linksCount || 0), 0);
            document.getElementById('totalLinks').textContent = totalLinks;
        }

        function handleStatusChange(orderId, newStatus) {
            fetch(`/api/admin/order/${orderId}/status`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: newStatus})
            })
            .then(r => r.json())
            .then(() => { showToast('✅ Статус обновлён'); loadOrders(); })
            .catch(err => console.error('Ошибка:', err));
        }

        function handleDelete(orderId) {
            if (confirm('Удалить заказ #' + orderId + '?')) {
                fetch(`/api/admin/order/${orderId}`, {method: 'DELETE'})
                    .then(r => r.json())
                    .then(() => { showToast('🗑️ Заказ удалён'); loadOrders(); })
                    .catch(err => console.error('Ошибка:', err));
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</body>
</html>
