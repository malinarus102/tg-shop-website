<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏁 F1 БРАСЛЕТЫ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .section-hidden {
            display: none !important;
        }
        
        .section {
            padding: 40px 20px;
            text-align: center;
        }
        
        .section-title {
            font-size: 2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #fff;
        }
        
        .section-title span {
            color: #CC0000;
        }
        
        .teams-grid, .designs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .team-card, .design-card {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #333;
            padding: 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .team-card:hover {
            border-color: #CC0000;
            transform: translateY(-5px);
            box-shadow: 0 6px 25px rgba(204, 0, 0, 0.3);
        }
        
        .team-color {
            width: 100%;
            height: 30px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        
        .team-name {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }
        
        .team-drivers {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        
        .team-designs {
            color: #CC0000;
            font-size: 0.9em;
            font-weight: 700;
        }
        
        .design-card {
            border-color: #333;
        }
        
        .design-card:hover {
            border-color: #CC0000;
            box-shadow: 0 6px 25px rgba(204, 0, 0, 0.3);
        }
        
        .design-name {
            margin-top: 10px;
            font-weight: 700;
        }
        
        .progress-section {
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #CC0000;
            padding: 30px;
            border-radius: 6px;
            margin-bottom: 30px;
        }
        
        .progress-bar {
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #CC0000 0%, #ff0000 100%);
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.3s;
            font-weight: 700;
        }
        
        .summary-list {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .summary-item {
            color: #fff;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            margin-bottom: 8px;
            border-radius: 4px;
        }
        
        .summary-item span {
            color: #aaa;
            font-size: 0.9em;
            margin-left: 10px;
        }
        
        .btn-remove {
            padding: 6px 12px;
            background: rgba(204,0,0,0.5);
            color: #fff;
            border: 1px solid #CC0000;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-remove:hover {
            background: #CC0000;
        }
        
        .btn {
            padding: 16px 30px;
            background: #CC0000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-bottom: 12px;
            width: 100%;
        }
        
        .btn:hover {
            background: #ff0000;
            box-shadow: 0 6px 25px rgba(204, 0, 0, 0.5);
        }
        
        .btn-secondary {
            background: #333;
            border: 1px solid #666;
        }
        
        .btn-secondary:hover {
            background: #555;
        }
        
        .quantity-box {
            background: rgba(25,25,25,1);
            border: 2px solid #CC0000;
            padding: 30px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .quantity-box label {
            color: #fff;
            font-size: 1.1em;
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
        }
        
        .quantity-box input {
            padding: 14px 18px;
            font-size: 1.3em;
            width: 120px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #CC0000;
            color: #fff;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        
        .wrist-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #CC0000;
        }
        
        .wrist-info p {
            margin: 10px 0;
            font-size: 1.05em;
        }
        
        .wrist-info strong {
            color: #CC0000;
        }
        
        .price-display {
            font-size: 2em;
            color: #CC0000;
            font-weight: 900;
            margin: 20px 0;
        }

        .start-box {
            background: rgba(25,25,25,1);
            border: 2px solid #CC0000;
            padding: 24px;
            border-radius: 6px;
            margin-bottom: 24px;
            text-align: center;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }

        .start-box p {
            color: #aaa;
            margin-top: 12px;
            font-size: 0.95em;
            line-height: 1.4;
        }

        .checkout-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            padding: 20px;
        }

        .checkout-modal {
            width: 100%;
            max-width: 520px;
            background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
            border: 2px solid #CC0000;
            border-radius: 8px;
            padding: 28px 24px;
            text-align: left;
        }

        .checkout-title {
            font-size: 1.4em;
            text-transform: uppercase;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .checkout-title span {
            color: #CC0000;
        }

        .checkout-field {
            margin-bottom: 14px;
        }

        .checkout-field label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .checkout-field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 4px;
            border: 1px solid #555;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-size: 1em;
        }

        .checkout-field input:focus {
            outline: none;
            border-color: #CC0000;
        }

        .checkout-error {
            color: #ff7b7b;
            min-height: 20px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .checkout-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .remaining-links {
            color: #aaa;
            font-size: 0.95em;
            margin-bottom: 14px;
        }

        .remaining-links strong {
            color: #CC0000;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        
        <!-- ЭКРАН 1: ВЫБОР КОМАНДЫ -->
        <div id="screen1" class="section">
            <h2 class="section-title">ВЫБЕРИТЕ <span>КОМАНДУ</span></h2>
            <div class="start-box">
                <label for="startWristInput">ОБХВАТ ЗАПЯСТЬЯ (СМ)</label>
                <input type="number" id="startWristInput" min="1" max="40" step="0.5" value="17">
                <p>
                    Количество звеньев рассчитывается автоматически по формуле:
                    <strong>обхват + 1</strong>
                </p>
            </div>
            <div class="teams-grid" id="teamsGrid"></div>
        </div>

        <!-- ЭКРАН 2: КОМАНДА ВЫБРАНА -->
        <div id="screen2" class="section section-hidden">
            <h2 class="section-title">
                КОМАНДА <span id="selectedTeamName"></span> ВЫБРАНА
            </h2>
            <button class="btn" onclick="goToScreen1()">← ВЫБРАТЬ ДРУГУЮ</button>
        </div>

        <!-- ЭКРАН 3: ВЫБОР ДИЗАЙНА -->
        <div id="screen3" class="section section-hidden">
            <h2 class="section-title">
                ДИЗАЙН ДЛЯ <span id="selectedTeamName2"></span>
            </h2>
            <div class="designs-grid" id="designsGrid"></div>
            
            <div class="quantity-box">
                <label for="quantityInput">КОЛИЧЕСТВО ЗВЕНЬЕВ:</label>
                <input type="number" id="quantityInput" min="1" max="50" value="1">
            </div>
            <p class="remaining-links" id="remainingLinksHint">Осталось добавить: <strong>18</strong> звеньев</p>
            
            <button class="btn" onclick="addToCart()">✅ ДОБАВИТЬ ЕЩЕ</button>
            <button class="btn btn-secondary" onclick="goToScreen1()">← ВЫБРАТЬ КОМАНДУ</button>
            <button class="btn btn-secondary" onclick="goToScreen4()">📋 ПЕРЕЙТИ К ИТОГУ</button>
        </div>

        <!-- ЭКРАН 4: СБОРКА БРАСЛЕТА -->
        <div id="screen4" class="section section-hidden">
            <h2 class="section-title">СБОРКА <span>БРАСЛЕТА</span></h2>
            
            <div class="wrist-info">
                <p>📏 Размер запястья: <strong id="wristSizeDisplay">17</strong> см</p>
                <p>🔗 Звеньев добавлено: <strong id="linksCountDisplay">0</strong> из <strong id="requiredLinksDisplay">18</strong></p>
            </div>

            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%;">
                        <span id="progressText">0%</span>
                    </div>
                </div>
            </div>

            <h3 style="margin-bottom: 15px;">СОСТАВ БРАСЛЕТА:</h3>
            <div class="summary-list" id="summaryList"></div>

            <div class="price-display" id="currentPrice">700₽</div>
            <input type="hidden" id="totalPrice" value="700">

            <button class="btn" id="submitBtn" onclick="submitOrder()" style="display: none;">
                🛒 ОФОРМИТЬ ЗАКАЗ
            </button>
            <button class="btn btn-secondary" onclick="goToScreen3()">➕ ДОБАВИТЬ ЕЩЕ</button>
        </div>
    </div>

    <div id="checkoutOverlay" class="checkout-overlay">
        <div class="checkout-modal">
            <h3 class="checkout-title">Финишный <span>пит-стоп</span></h3>
            <div class="checkout-field">
                <label for="checkoutTg">Telegram заказчика</label>
                <input id="checkoutTg" type="text" placeholder="@username">
            </div>
            <div class="checkout-field">
                <label for="checkoutCity">Город для доставки</label>
                <input id="checkoutCity" type="text" placeholder="Москва">
            </div>
            <div class="checkout-field">
                <label for="checkoutPhone">Номер телефона</label>
                <input id="checkoutPhone" type="tel" placeholder="+7 999 000-00-00">
            </div>
            <div id="checkoutError" class="checkout-error"></div>
            <div class="checkout-buttons">
                <button class="btn" id="finishPitStopBtn" onclick="finishPitStop()">🏁 ЗАКОНЧИТЬ ПИТ-СТОП</button>
                <button class="btn btn-secondary" onclick="closeCheckoutModal()">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        let allTeams = [];
        let selectedTeam = null;
        let selectedDesign = null;
        let selectedLinks = [];
        let wristSize = 17;
        let requiredLinksCount = 18;

        function init() {
            fetch('/api/teams')
                .then(r => r.json())
                .then(teams => {
                    allTeams = teams;
                    renderTeams();
                });
        }

        function renderTeams() {
            const grid = document.getElementById('teamsGrid');
            grid.innerHTML = allTeams.map(team => `
                <div class="team-card" onclick="selectTeam('${team.id}', '${team.name}')">
                    <div class="team-color" style="background: ${team.color};"></div>
                    <div class="team-name">${team.name}</div>
                    <div class="team-drivers">${team.drivers.join(', ')}</div>
                    <div class="team-designs">${team.designsCount} дизайнов</div>
                </div>
            `).join('');
        }

        function selectTeam(teamId, teamName) {
            if (!applyStartValues()) {
                return;
            }
            selectedTeam = teamId;
            document.getElementById('selectedTeamName').textContent = teamName;
            document.getElementById('selectedTeamName2').textContent = teamName;
            loadDesigns(teamId);
            goToScreen3();
        }

        function applyStartValues() {
            const wristInput = document.getElementById('startWristInput');
            const rawValue = (wristInput.value || '').replace(',', '.');
            const parsedWrist = parseFloat(rawValue);

            if (!Number.isFinite(parsedWrist) || parsedWrist <= 0) {
                alert('❌ Введите корректный обхват запястья, например: 17 или 17.5');
                wristInput.focus();
                return false;
            }

            wristSize = parsedWrist;
            requiredLinksCount = Math.max(1, Math.round(wristSize + 1));

            document.getElementById('wristSizeDisplay').textContent = wristSize;
            document.getElementById('requiredLinksDisplay').textContent = requiredLinksCount;
            updateRemainingLinksHint();

            return true;
        }

        function loadDesigns(teamId) {
            fetch(`/api/teams/${teamId}/designs`)
                .then(r => r.json())
                .then(designs => {
                    const grid = document.getElementById('designsGrid');
                    grid.innerHTML = designs.map(design => `
                        <div class="design-card" onclick="selectDesign('${design.id}')">
                            <img src="/api/pic/${design.image}" alt="${design.name}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 4px;">
                            <div class="design-name">${design.name}</div>
                        </div>
                    `).join('');
                });
        }

        function selectDesign(designId) {
            selectedDesign = designId;
        }

        function addToCart() {
            if (!selectedTeam || !selectedDesign) {
                alert('❌ Выберите команду и дизайн!');
                return;
            }

            const quantityInput = document.getElementById('quantityInput');
            if (!quantityInput) {
                alert('❌ Ошибка загрузки формы');
                return;
            }

            const quantity = parseInt(quantityInput.value) || 1;
            const currentTotal = selectedLinks.length + quantity;

            if (currentTotal > requiredLinksCount) {
                const canAdd = requiredLinksCount - selectedLinks.length;
                alert(`❌ Можешь добавить максимум ${canAdd} звеньев!\n\nТебе нужно всего: ${requiredLinksCount}`);
                return;
            }

            if (quantity < 1) {
                alert('❌ Количество должно быть минимум 1!');
                return;
            }

            const team = allTeams.find(t => t.id === selectedTeam);
            if (!team) {
                alert('❌ Команда не найдена!');
                return;
            }
            
            for (let i = 0; i < quantity; i++) {
                selectedLinks.push({
                    teamId: selectedTeam,
                    teamName: team.name,
                    designId: selectedDesign,
                    color: team.color
                });
            }

            quantityInput.value = 1;
            updateProgress();
            updateRemainingLinksHint();
        }

        function updateProgress() {
            const currentCount = selectedLinks.length;
            const percent = Math.min(100, Math.round((currentCount / requiredLinksCount) * 100));

            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
            document.getElementById('linksCountDisplay').textContent = currentCount;
            
            updateSummary();
        }

        function updateSummary() {
            const list = document.getElementById('summaryList');
            const linksCount = selectedLinks.length;
            
            let totalPrice = 700;
            if (linksCount > 20) {
                const extraLinks = linksCount - 20;
                totalPrice += extraLinks * 40;
            }

            if (selectedLinks.length === 0) {
                list.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">Звенья не выбраны</p>';
                document.getElementById('totalPrice').value = '0';
                document.getElementById('submitBtn').style.display = 'none';
                return;
            }

            const linkGroups = {};
            selectedLinks.forEach((link) => {
                const key = link.teamId;
                if (!linkGroups[key]) {
                    linkGroups[key] = { team: link, links: [] };
                }
                linkGroups[key].links.push(link);
            });

            list.innerHTML = Object.values(linkGroups).map((group) => `
                <div class="summary-item" style="color: ${group.team.color};">
                    <div>
                        <span class="team-name">${group.team.teamName}</span>
                        <span>${group.links.length} звеньев</span>
                    </div>
                    <button class="btn-remove" onclick="removeLinks('${group.team.teamId}')">🗑️ Удалить</button>
                </div>
            `).join('');

            document.getElementById('currentPrice').textContent = totalPrice + '₽';
            document.getElementById('totalPrice').value = totalPrice;

            if (selectedLinks.length === requiredLinksCount) {
                document.getElementById('submitBtn').style.display = 'block';
            } else {
                document.getElementById('submitBtn').style.display = 'none';
            }
        }

        function removeLinks(teamId) {
            selectedLinks = selectedLinks.filter(link => link.teamId !== teamId);
            updateProgress();
            updateRemainingLinksHint();
        }

        function updateRemainingLinksHint() {
            const remaining = Math.max(0, requiredLinksCount - selectedLinks.length);
            const hintEl = document.getElementById('remainingLinksHint');
            if (!hintEl) {
                return;
            }
            hintEl.innerHTML = `Осталось добавить: <strong>${remaining}</strong> звеньев`;
        }

        function calculateTotalPrice() {
            let totalPrice = 700;
            if (selectedLinks.length > 20) {
                const extraLinks = selectedLinks.length - 20;
                totalPrice += extraLinks * 40;
            }
            return totalPrice;
        }

        function submitOrder() {
            if (selectedLinks.length !== requiredLinksCount) {
                alert(`❌ Для оформления нужно ровно ${requiredLinksCount} звеньев`);
                return;
            }
            openCheckoutModal();
        }

        function openCheckoutModal() {
            const totalPrice = calculateTotalPrice();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = `🛒 ОФОРМИТЬ ЗАКАЗ (${totalPrice}₽)`;
            document.getElementById('checkoutError').textContent = '';
            document.getElementById('checkoutOverlay').style.display = 'flex';
        }

        function closeCheckoutModal() {
            document.getElementById('checkoutOverlay').style.display = 'none';
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.textContent = '🛒 ОФОРМИТЬ ЗАКАЗ';
        }

        function finishPitStop() {
            const userTg = document.getElementById('checkoutTg').value.trim();
            const userCity = document.getElementById('checkoutCity').value.trim();
            const userPhone = document.getElementById('checkoutPhone').value.trim();
            const errorBox = document.getElementById('checkoutError');
            const finishBtn = document.getElementById('finishPitStopBtn');
            const submitBtn = document.getElementById('submitBtn');

            if (!userTg || !userCity || !userPhone) {
                errorBox.textContent = 'Заполни все поля перед завершением.';
                return;
            }

            const totalPrice = calculateTotalPrice();
            finishBtn.disabled = true;
            finishBtn.textContent = '⏳ ОТПРАВКА...';

            const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
            const orderData = {
                wristSize: wristSize,
                linksCount: selectedLinks.length,
                totalPrice: totalPrice,
                links: selectedLinks,
                userName: userTg,
                userPhone: userPhone,
                userTg: userTg,
                userCity: userCity,
                userTgId: tgUser?.id ?? null
            };

            fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            })
            .then(async response => {
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.message || 'Ошибка сервера');
                }
                return payload;
            })
            .then(data => {
                if (data.success) {
                    closeCheckoutModal();
                    showThankYouScreen(userTg);
                } else {
                    errorBox.textContent = 'Ошибка: ' + data.message;
                    finishBtn.disabled = false;
                    finishBtn.textContent = '🏁 ЗАКОНЧИТЬ ПИТ-СТОП';
                }
            })
            .catch(err => {
                console.error('Ошибка:', err);
                errorBox.textContent = 'Ошибка отправки заказа: ' + err.message;
                finishBtn.disabled = false;
                finishBtn.textContent = '🏁 ЗАКОНЧИТЬ ПИТ-СТОП';
                submitBtn.disabled = false;
            });
        }

        function showThankYouScreen(userTg) {
            const thankYouHTML = `
                <div id="thankYouOverlay" style="
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999;
                ">
                    <div style="
                        background: linear-gradient(135deg, rgba(25,25,25,1) 0%, rgba(35,35,35,1) 100%);
                        border: 3px solid #CC0000;
                        padding: 60px 50px;
                        border-radius: 8px;
                        text-align: center;
                        max-width: 500px;
                        animation: slideIn 0.5s ease-out;
                    ">
                        <div style="font-size: 4em; margin-bottom: 20px;">✅</div>
                        <h1 style="
                            font-size: 2em;
                            color: #fff;
                            margin-bottom: 20px;
                            text-transform: uppercase;
                            letter-spacing: 2px;
                        ">СПАСИБО ЗА ЗАКАЗ!</h1>
                        
                        <p style="
                            font-size: 1.1em;
                            color: #aaa;
                            margin-bottom: 15px;
                            line-height: 1.6;
                        ">
                            Спасибо за заказ, <strong style="color: #CC0000;">${userTg}</strong>!<br><br>
                            Скоро с вами свяжутся для подтверждения доставки.
                        </p>

                        <div style="
                            background: rgba(204, 0, 0, 0.1);
                            border-left: 4px solid #CC0000;
                            padding: 20px;
                            margin-bottom: 30px;
                            border-radius: 4px;
                            text-align: left;
                        ">
                            <p style="color: #fff; margin-bottom: 10px;">
                                📞 <strong>Мы скоро свяжемся с вами</strong>
                            </p>
                            <p style="color: #aaa; font-size: 0.95em;">
                                Мы уже получили заявку и подтвердим детали в Telegram и по телефону 🚀
                            </p>
                        </div>

                        <button onclick="location.reload()" style="
                            width: 100%;
                            padding: 16px;
                            background: #CC0000;
                            color: #fff;
                            border: none;
                            border-radius: 4px;
                            font-weight: 700;
                            font-size: 1.1em;
                            cursor: pointer;
                            text-transform: uppercase;
                            letter-spacing: 1px;
                            transition: all 0.3s;
                        " onmouseover="this.style.background='#ff0000'" onmouseout="this.style.background='#CC0000'">
                            НОВЫЙ ЗАКАЗ
                        </button>
                    </div>
                </div>

                <style>
                    @keyframes slideIn {
                        from {
                            opacity: 0;
                            transform: translateY(-50px);
                        }
                        to {
                            opacity: 1;
                            transform: translateY(0);
                        }
                    }
                </style>
            `;

            document.body.insertAdjacentHTML('beforeend', thankYouHTML);

            setTimeout(() => {
                location.reload();
            }, 8000);
        }

        function goToScreen1() {
            document.querySelectorAll('.section').forEach(s => s.classList.add('section-hidden'));
            document.getElementById('screen1').classList.remove('section-hidden');
        }

        function goToScreen3() {
            document.querySelectorAll('.section').forEach(s => s.classList.add('section-hidden'));
            document.getElementById('screen3').classList.remove('section-hidden');
            updateRemainingLinksHint();
        }

        function goToScreen4() {
            document.querySelectorAll('.section').forEach(s => s.classList.add('section-hidden'));
            document.getElementById('screen4').classList.remove('section-hidden');
            document.getElementById('wristSizeDisplay').textContent = wristSize;
            document.getElementById('requiredLinksDisplay').textContent = requiredLinksCount;
        }

        init();
    </script>
</body>
</html>
